<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-start" markerWidth="10" markerHeight="10" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 10 7, 0 3.5" fill="#333" />
    </marker>
    <marker id="arrow-end" markerWidth="10" markerHeight="10" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
    <marker id="arrow-blue-start" markerWidth="12" markerHeight="12" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 10 7, 0 3.5" fill="#2E86C1" />
    </marker>
    <marker id="arrow-blue-end" markerWidth="12" markerHeight="12" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E86C1" />
    </marker>

    <g id="server-icon">
      <path d="M50,15 L80,0 L80,75 L50,90 Z" fill="#A9CCE3" stroke="#2C3E50" stroke-width="2"/>
      <path d="M0,15 L30,0 L80,0 L50,15 Z" fill="#D4E6F1" stroke="#2C3E50" stroke-width="2"/>
      <rect x="0" y="15" width="50" height="75" fill="#EAF2F8" stroke="#2C3E50" stroke-width="2"/>
      <line x1="5" y1="30" x2="45" y2="30" stroke="#BDC3C7" stroke-width="2"/>
      <circle cx="10" cy="22" r="2" fill="#F39C12"/>
      <circle cx="20" cy="22" r="2" fill="#2ECC71"/>
      
      <line x1="5" y1="55" x2="45" y2="55" stroke="#BDC3C7" stroke-width="2"/>
      <circle cx="10" cy="47" r="2" fill="#F39C12"/>
      <circle cx="20" cy="47" r="2" fill="#2ECC71"/>

      <line x1="5" y1="80" x2="45" y2="80" stroke="#BDC3C7" stroke-width="2"/>
       <line x1="55" y1="75" x2="65" y2="70" stroke="#2C3E50" stroke-width="2"/>
      <line x1="55" y1="80" x2="65" y2="75" stroke="#2C3E50" stroke-width="2"/>
    </g>

    <g id="db-icon">
      <path d="M0,20 L0,80 A30,10 0 0,0 60,80 L60,20" fill="#EAF2F8" stroke="#2C3E50" stroke-width="2"/>
      <ellipse cx="30" cy="20" rx="30" ry="10" fill="#D4E6F1" stroke="#2C3E50" stroke-width="2"/>
      <path d="M0,40 A30,10 0 0,0 60,40" fill="none" stroke="#E67E22" stroke-width="3"/>
      <path d="M0,60 A30,10 0 0,0 60,60" fill="none" stroke="#E67E22" stroke-width="3"/>
    </g>
  </defs>

  <rect width="100%" height="100%" fill="#F8FBFF"/>

  <g transform="translate(100, 200)">
    <use href="#server-icon" />
    <text x="25" y="120" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">
      <tspan x="25" dy="0">Optional Spring</tspan>
      <tspan x="25" dy="15">Server</tspan>
      <tspan x="25" dy="15">(Authentication)</tspan>
    </text>
  </g>

  <g transform="translate(350, 100)">
    <use href="#server-icon" />
    <text x="40" y="-15" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">WebServer</text>
  </g>

  <g transform="translate(400, 320)">
    <use href="#db-icon" transform="scale(1.2)" />
    <text x="36" y="115" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">PouchDB</text>
  </g>

  <g transform="translate(600, 200)">
    <use href="#db-icon" transform="scale(1.2)" />
    <text x="36" y="115" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">CouchDB</text>
  </g>

  <line x1="190" y1="240" x2="340" y2="210" stroke="#333" stroke-width="2" stroke-dasharray="8,4" 
        marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>

  <line x1="410" y1="200" x2="430" y2="310" stroke="#333" stroke-width="3" 
        marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>

  <line x1="490" y1="360" x2="590" y2="280" stroke="#2E86C1" stroke-width="5"
        marker-start="url(#arrow-blue-start)" marker-end="url(#arrow-blue-end)"/>
  
  <text x="580" y="340" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#000">
      <tspan x="580" dy="0">Offline</tspan>
      <tspan x="580" dy="15">Synchronisation</tspan>
  </text>

  <path d="M150,290 Q400,600 660,290" fill="none" stroke="#2C3E50" stroke-width="2" stroke-dasharray="8,5"
        marker-start="url(#arrow-start)" marker-end="url(#arrow-start)"/>

</svg>
