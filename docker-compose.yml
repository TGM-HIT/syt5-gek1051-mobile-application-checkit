services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_COUCHDB_URL: http://admin:${PASSWORD}@localhost:5984
        VITE_PEPPER: ${PASSWORD}
    ports:
      - "${FRONTEND_PORT}:80"

  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT}:8080"

  db:
    image: couchdb:latest
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=${PASSWORD}
    ports:
      - "5984:5984"
    volumes:
      - ./couchdb-config/local.ini:/opt/couchdb/etc/local.d/cors.ini
    #  - couchdb_data:/opt/couchdb/data
