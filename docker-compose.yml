services:
  frontend:
    build:
      context: ./frontend
      args:
        # Hier nutzen wir jetzt DROPLET_IP statt localhost!
        VITE_COUCHDB_URL: http://admin:${PASSWORD}@${DROPLET_IP}:5984
        VITE_PEPPER: ${PASSWORD}
    ports:
      - "${FRONTEND_PORT}:80"

  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT}:8080"

  db:
    image: couchdb:latest
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=${PASSWORD}
    ports:
      - "5984:5984"
    volumes:
      - couchdb_data:/opt/couchdb/data

volumes:
  couchdb_data: