services:
  frontend:
    build:
      context: ./frontend
      args:
        # HIER DEINE DUCKDNS DOMAIN EINTRAGEN (und auf https:// achten!):
        VITE_COUCHDB_URL: https://admin:${PASSWORD}@checkit-shoppinglist.duckdns.org:5984
        VITE_PEPPER: ${PASSWORD}
    # Die "ports" wurden hier entfernt, das macht jetzt Caddy!

  backend:
    build:
      context: ./backend
    # Die "ports" wurden hier entfernt!

  db:
    image: couchdb:latest
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=${PASSWORD}
    volumes:
      - couchdb_data:/opt/couchdb/data
    # Die "ports" wurden hier entfernt!

  # --- DER NEUE TÜRSTEHER ---
  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"       # Normales HTTP (wird automatisch auf HTTPS umgeleitet)
      - "443:443"     # Sicheres HTTPS (Das Schloss!)
      - "8080:8080"   # Backend über HTTPS
      - "5984:5984"   # Datenbank über HTTPS
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  couchdb_data:
  caddy_data:
  caddy_config: