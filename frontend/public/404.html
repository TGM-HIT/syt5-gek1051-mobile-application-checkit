<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CheckIT</title>
  <script>
    // SPA redirect for GitHub Pages: encode path into query param, index.html picks it up
    var base = '/syt5-gek1051-mobile-application-checkit/';
    var pathAfterBase = location.pathname.slice(base.length);
    if (pathAfterBase) {
      location.replace(base + '?p=' + encodeURIComponent('/' + pathAfterBase + location.search + location.hash));
    }
  </script>
</head>
<body></body>
</html>
