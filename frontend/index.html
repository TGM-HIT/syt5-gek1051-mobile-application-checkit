<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/checkbox.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckIT</title>
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.global = window;
      // SPA redirect for GitHub Pages: restore path from 404.html redirect
      (function () {
        var q = new URLSearchParams(window.location.search);
        var p = q.get('p');
        if (p) {
          q.delete('p');
          var qs = q.toString();
          history.replaceState(null, '', p + (qs ? '?' + qs : ''));
        }
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
