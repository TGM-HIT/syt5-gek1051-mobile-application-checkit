name: CheckIT CI Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Code auschecken
        uses: actions/checkout@v4

      # Frontend Build Test
      - name: ⚙️ Node.js für Frontend aufsetzen
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: 📦 Frontend Abhängigkeiten installieren & Build ausführen
        working-directory: ./frontend
        run: |
          yarn install
          yarn build

      # Backend Build Test
      - name: ☕ Java JDK 21 für Backend aufsetzen
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🔨 Backend mit Gradle bauen
        working-directory: ./backend
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test
          
      # Docker Compose Test (BITTE PASSWORT DURCH GITHUB SECRETS ERSETZEN!)
      - name: 🐳 Docker Compose ausführen
        env:
          FRONTEND_PORT: 80
          BACKEND_PORT: 8080
          PASSWORD: ${{ secrets.DOCKER_PASSWORD }} # Geändert für deine Sicherheit!
        run: docker compose build

  # --- NEUER JOB FÜR CYPRESS E2E TESTS ---
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Code auschecken
        uses: actions/checkout@v4

      - name: ⚙️ Node.js für Frontend aufsetzen
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Frontend Abhängigkeiten installieren
        working-directory: ./frontend
        run: yarn install

      - name: 🧪 Cypress E2E Tests ausführen
        uses: cypress-io/github-action@v6
        with:
          # Sagt der Action, dass sich alles im Frontend-Ordner abspielt
          working-directory: ./frontend 
          # Startet deinen Vue-Server im Hintergrund
          start: yarn dev 
          # Wartet, bis der Server da ist, bevor Cypress loslegt
          wait-on: 'http://localhost:5173' 

      - name: 📸 Screenshots hochladen (nur bei Fehlern)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots
          retention-days: 7

      - name: 🎥 Videos hochladen
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: frontend/cypress/videos
          retention-days: 7
