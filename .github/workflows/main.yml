name: CheckIT CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Code auschecken
        uses: actions/checkout@v4

      # Frontend Build Test
      - name: ⚙️ Node.js für Frontend aufsetzen
        uses: actions/setup-node@v4
        with:
          [cite_start]node-version: '20' # Entspricht node:20-alpine [cite: 1]
          
      - name: 📦 Frontend Abhängigkeiten installieren & Build ausführen
        working-directory: ./frontend
        run: |
          yarn install
          [cite_start]yarn build # Baut das Frontend [cite: 2]

      # Backend Build Test
      - name: ☕ Java JDK 21 für Backend aufsetzen
        uses: actions/setup-java@v4
        with:
          [cite_start]java-version: '21' # Entspricht eclipse-temurin:21-jdk [cite: 3]
          distribution: 'temurin'

      - name: 🔨 Backend mit Gradle bauen
        working-directory: ./backend
        run: |
          chmod +x gradlew
          [cite_start]./gradlew bootJar -x test # Führt den Build ohne Tests aus [cite: 3]

      # Docker Compose Test
      - name: 🐳 Docker Images testen (Build)
        env:
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT || 80 }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT || 8080 }}
          PASSWORD: ${{ secrets.DB_PASSWORD || 'test-password' }}
        run: docker-compose build
