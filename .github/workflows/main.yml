name: CheckIT CI Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Code auschecken
        uses: actions/checkout@v4

      # Frontend Build Test
      - name: ⚙️ Node.js für Frontend aufsetzen
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Frontend Abhängigkeiten installieren & Build ausführen
        working-directory: ./frontend
        run: |
          yarn install
          yarn build

      # Backend Build Test
      - name: ☕ Java JDK 21 für Backend aufsetzen
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🔨 Backend mit Gradle bauen
        working-directory: ./backend
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test

      - name: 🐳 Docker Compose Build Test
        env:
          FRONTEND_PORT: 80
          BACKEND_PORT: 8080
          PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: docker compose build

  build-pages:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ Frontend für GitHub Pages bauen
        working-directory: ./frontend
        env:
          GITHUB_PAGES: true
        run: |
          npm install
          npm run build-only

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy-pages:
    needs: build-pages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
