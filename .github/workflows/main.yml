name: CheckIT CI Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

# WICHTIG: Erlaubt GitHub, Docker-Images zu speichern
permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Code auschecken
        uses: actions/checkout@v4

      - name: ⚙️ Node.js für Frontend aufsetzen
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: 📦 Frontend Abhängigkeiten installieren & Build ausführen
        working-directory: ./frontend
        run: |
          yarn install
          yarn build

      - name: ☕ Java JDK 21 für Backend aufsetzen
        uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }

      - name: 🔨 Backend mit Gradle bauen
        working-directory: ./backend
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - working-directory: ./frontend
        run: yarn install
      - name: 🧪 Cypress E2E Tests ausführen
        uses: cypress-io/github-action@v6
        with:
          working-directory: ./frontend
          start: yarn dev
          wait-on: 'http://localhost:5173'

  # NEUER JOB: Baut die Docker-Images auf den starken GitHub-Servern
  build-images:
    needs: [ build-and-test, e2e-tests ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: 📥 Code auschecken
        uses: actions/checkout@v4

      - name: 🔠 Repository-Namen für Docker formatieren
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: 🔑 Login bei GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Frontend bauen & pushen
        run: |
          docker build -t ghcr.io/$REPO-frontend:latest ./frontend
          docker push ghcr.io/$REPO-frontend:latest

      - name: 🐳 Backend bauen & pushen
        run: |
          docker build -t ghcr.io/$REPO-backend:latest ./backend
          docker push ghcr.io/$REPO-backend:latest

  # ANGEPASSTER JOB: Lädt nur noch die fertigen Images herunter
  deploy-server:
    needs: build-images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: 🚀 Deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          passphrase: ${{ secrets.DO_SSH_PASSPHRASE }}
          script: |
            REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            
            mkdir -p /var/www/checkit
            cd /var/www/checkit

            # 1. Code sauber ziehen
            if [ ! -d ".git" ]; then
              git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git .
            else
              git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git
              git reset --hard
              git pull origin main
            fi
            
            # 2. Server loggt sich bei GitHubs Docker-Registry ein (Nutzt dein aktualisiertes Token!)
            echo "${{ secrets.GH_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            
            # 3. .env schreiben
            echo "PASSWORD=${{ secrets.DOCKER_PASSWORD }}" > .env
            echo "FRONTEND_PORT=80" >> .env
            echo "BACKEND_PORT=8080" >> .env
            echo "DROPLET_IP=${{ secrets.DO_HOST }}" >> .env
            
            # 4. TRICK: Diese Override-Datei verbietet dem Server das Bauen und zwingt ihn, GitHubs Images zu nutzen
            cat <<EOF > docker-compose.override.yml
            services:
              frontend:
                image: ghcr.io/$REPO-frontend:latest
              backend:
                image: ghcr.io/$REPO-backend:latest
            EOF
            
            # 5. Herunterladen (Dauert nur Sekunden!) und Starten ohne Build!
            docker compose pull
            docker compose up -d --no-build
            docker image prune -f

  build-pages:
    needs: [ build-and-test, e2e-tests ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: 🏗️ Frontend für GitHub Pages bauen
        working-directory: ./frontend
        env:
          GITHUB_PAGES: true
          VITE_COUCHDB_URL: http://admin:${{ secrets.DOCKER_PASSWORD }}@${{ secrets.DO_HOST }}:5984
          VITE_PEPPER: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          npm install
          npm run build-only
      - uses: actions/upload-pages-artifact@v3
        with: { path: frontend/dist }

  deploy-pages:
    needs: build-pages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
