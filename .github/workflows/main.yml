name: CheckIT CI Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Code auschecken
        uses: actions/checkout@v4

      # Frontend Build Test
      - name: ⚙️ Node.js für Frontend aufsetzen
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Frontend Abhängigkeiten installieren & Build ausführen
        working-directory: ./frontend
        run: |
          yarn install
          yarn build

      # Backend Build Test
      - name: ☕ Java JDK 21 für Backend aufsetzen
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🔨 Backend mit Gradle bauen
        working-directory: ./backend
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test

      - name: 🐳 Docker Compose Build Test
        env:
          FRONTEND_PORT: 80
          BACKEND_PORT: 8080
          PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: docker compose build

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Code auschecken
        uses: actions/checkout@v4

      - name: ⚙️ Node.js für Frontend aufsetzen
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Frontend Abhängigkeiten installieren
        working-directory: ./frontend
        run: yarn install

      - name: 🧪 Cypress E2E Tests ausführen
        uses: cypress-io/github-action@v6
        with:
          working-directory: ./frontend
          start: yarn dev
          wait-on: 'http://localhost:5173'

      - name: 📸 Screenshots hochladen (nur bei Fehlern)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots
          retention-days: 7

      - name: 🎥 Videos hochladen
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: frontend/cypress/videos
          retention-days: 7

  deploy-server:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 🚀 Deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /var/www/checkit || (mkdir -p /var/www && cd /var/www && git clone https://github.com/${{ github.repository }}.git checkit && cd checkit)
            git pull origin main
            echo "PASSWORD=${{ secrets.DB_PASSWORD }}" > .env
            echo "FRONTEND_PORT=80" >> .env
            echo "BACKEND_PORT=8080" >> .env
            docker compose up -d --build
            docker image prune -f

  build-pages:
    needs: [ build-and-test, e2e-tests ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ Frontend für GitHub Pages bauen
        working-directory: ./frontend
        env:
          GITHUB_PAGES: true
        run: |
          npm install
          npm run build-only

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy-pages:
    needs: build-pages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
