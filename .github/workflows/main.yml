name: CheckIT CI Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Code auschecken
        uses: actions/checkout@v4

      - name: ⚙️ Node.js für Frontend aufsetzen
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Frontend Abhängigkeiten installieren & Build ausführen
        working-directory: ./frontend
        run: |
          yarn install
          yarn build

      - name: ☕ Java JDK 21 für Backend aufsetzen
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🔨 Backend mit Gradle bauen
        working-directory: ./backend
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test

      - name: 🐳 Docker Compose Build Test
        env:
          FRONTEND_PORT: 80
          BACKEND_PORT: 8080
          PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DROPLET_IP: ${{ secrets.DO_HOST }}
        run: docker compose build

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Code auschecken
        uses: actions/checkout@v4

      - name: ⚙️ Node.js für Frontend aufsetzen
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Frontend Abhängigkeiten installieren
        working-directory: ./frontend
        run: yarn install

      - name: 🧪 Cypress E2E Tests ausführen
        uses: cypress-io/github-action@v6
        with:
          working-directory: ./frontend
          start: yarn dev
          wait-on: 'http://localhost:5173'

      - name: 📸 Screenshots hochladen (nur bei Fehlern)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots
          retention-days: 7

  deploy-server:
    needs: [ build-and-test, e2e-tests ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 🚀 Deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          passphrase: ${{ secrets.DO_SSH_PASSPHRASE }}
          script: |
            # Sicherstellen, dass das Zielverzeichnis existiert
            mkdir -p /var/www
            cd /var/www

            # Falls das Verzeichnis noch nicht existiert, mit Token klonen
            if [ ! -d "checkit" ]; then
              echo "Cloning private repository..."
              git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git checkit
            fi

            cd checkit

            # Remote URL aktualisieren (um sicherzugehen, dass das Token aktuell bleibt)
            git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git
            
            # Neuesten Stand ziehen
            git pull origin main
            
            # .env Datei für Docker Compose erstellen
            echo "PASSWORD=${{ secrets.DOCKER_PASSWORD }}" > .env
            echo "FRONTEND_PORT=80" >> .env
            echo "BACKEND_PORT=8080" >> .env
            echo "DROPLET_IP=${{ secrets.DO_HOST }}" >> .env
            
            # Container neu bauen und starten
            docker compose up -d --build
            
            # Alte/unbenutzte Docker-Images aufräumen (spart Platz auf dem Droplet)
            docker image prune -f

  build-pages:
    needs: [ build-and-test, e2e-tests ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 🏗️ Frontend für GitHub Pages bauen
        working-directory: ./frontend
        env:
          GITHUB_PAGES: true
          VITE_COUCHDB_URL: http://admin:${{ secrets.DOCKER_PASSWORD }}@${{ secrets.DO_HOST }}:5984
          VITE_PEPPER: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          npm install
          npm run build-only
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy-pages:
    needs: build-pages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
