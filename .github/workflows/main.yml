name: CheckIT CI Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Code auschecken
        uses: actions/checkout@v4

      # Frontend Build Test
      - name: ⚙️ Node.js für Frontend aufsetzen
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: 📦 Frontend Abhängigkeiten installieren & Build ausführen
        working-directory: ./frontend
        run: |
          yarn install
          yarn build

      # Backend Build Test
      - name: ☕ Java JDK 21 für Backend aufsetzen
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🔨 Backend mit Gradle bauen
        working-directory: ./backend
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test
          
      # Docker Compose Test (Hier stehen jetzt deine Klartext-Passwörter)
      - name: 🐳 Docker Compose ausführen
        env:
          FRONTEND_PORT: 80
          BACKEND_PORT: 8080
          PASSWORD: AuraTruppe6767!
        run: docker-compose build
