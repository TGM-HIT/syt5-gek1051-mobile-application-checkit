name: CheckIT CI Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Code auschecken
        uses: actions/checkout@v4

      # Frontend Build Test
      - name: ⚙️ Node.js für Frontend aufsetzen
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: 📦 Frontend Abhängigkeiten installieren & Build ausführen
        working-directory: ./frontend
        run: |
          yarn install
          yarn build

      # Backend Build Test
      - name: ☕ Java JDK 21 für Backend aufsetzen
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🔨 Backend mit Gradle bauen
        working-directory: ./backend
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test
          
      - name: 🐳 Docker Compose Build Test
        env:
          FRONTEND_PORT: 80
          BACKEND_PORT: 8080
          PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: docker compose build

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: 🚀 Deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /var/www/checkit || (mkdir -p /var/www && cd /var/www && git clone https://github.com/${{ github.repository }}.git checkit && cd checkit)
            git pull origin main
            
            # Erstellt die produktive .env Datei aus den Secrets
            echo "PASSWORD=${{ secrets.DB_PASSWORD }}" > .env
            echo "FRONTEND_PORT=80" >> .env
            echo "BACKEND_PORT=8080" >> .env
            
            # Container updaten
            docker compose up -d --build
            # Optional: Alte Images aufräumen um Speicherplatz zu sparen
            docker image prune -f
