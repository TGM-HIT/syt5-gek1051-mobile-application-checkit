name: Cypress Tests

# Wann soll der Workflow laufen?
on:
  push:
    branches: [main]
    paths:
      - 'frontend/**' # Nur laufen lassen, wenn sich im Frontend was ändert
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
workflow_dispatch:

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Node.js (Version aus deiner package.json engines)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Hier nutzen wir die offizielle Cypress Action
      # Sie installiert Dependencies, baut die App, startet sie und testet
      - name: Cypress Run
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          # 1. Installieren (nutzt automatisch 'npm ci')
          
          # 2. Bauen (Wichtig: Vite Preview braucht vorher einen Build!)
          build: npm run build-only
          
          # 3. Starten (Der Server, gegen den getestet wird)
          start: npm run preview
          
          # 4. Warten, bis dieser Port antwortet, bevor Tests starten
          wait-on: 'http://localhost:4173'
          
          # Welchen Browser nutzen?
          browser: chrome
